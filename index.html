<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熊逃家圖鑑姓名貼 — 訂單進度查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: #faf8f5; color: #2c2c2a; min-height: 100vh; padding: 2rem 1rem; }
.brand { text-align: center; margin-bottom: 2.5rem; }
.brand-logo { width: 100px; margin: 0 auto 0.75rem; }
.brand-logo img { width: 100%; height: auto; display: block; mix-blend-mode: multiply; }
.brand-name { font-family: 'Noto Serif TC', serif; font-size: 1.35rem; font-weight: 600; letter-spacing: 0.06em; }
.brand-sub { font-size: 12px; color: #888780; letter-spacing: 0.15em; margin-top: 4px; }
.search-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; max-width: 480px; margin: 0 auto 1.5rem; width: 100%; }
.search-label { font-size: 13px; color: #888780; margin-bottom: 0.75rem; letter-spacing: 0.05em; }
.input-row { display: flex; gap: 8px; width: 100%; }
.input-row input { flex: 1; min-width: 0; height: 40px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; padding: 0 12px; background: #f7f5f2; color: #2c2c2a; outline: none; transition: border-color 0.15s; }
.input-row input:focus { border-color: #cb691a; }
.btn-search { height: 40px; padding: 0 18px; background: #cb691a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap; flex-shrink: 0; }
.btn-search:hover { background: #a85514; }
.btn-search:active { transform: scale(0.97); }
.btn-search:disabled { background: #ccc; cursor: not-allowed; }
.result-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; max-width: 480px; margin: 0 auto; overflow: hidden; display: none; }
.result-header { background: #f7f5f2; padding: 1rem 1.25rem; border-bottom: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
.result-order-no { font-size: 12px; color: #888780; letter-spacing: 0.05em; }
.result-order-val { font-size: 15px; font-weight: 500; margin-top: 2px; }
.result-body { padding: 1.25rem; }
.result-row { display: grid; grid-template-columns: 1fr 2fr; align-items: flex-start; padding: 8px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); font-size: 14px; gap: 0.5rem; }
.result-row:last-child { border-bottom: none; }
.result-key { color: #888780; font-size: 13px; flex-shrink: 0; margin-right: 1rem; padding-top: 2px; }
.result-val { text-align: right; font-weight: 500; }
.items-list { text-align: left; }
.item-line { font-size: 14px; font-weight: 500; line-height: 1.6; margin-bottom: 0.4rem; }
.item-line:last-child { margin-bottom: 0; }
.item-subline { font-size: 12px; color: #888780; font-weight: 400; line-height: 1.4; }
.status-bar { padding: 1.25rem; border-top: 0.5px solid rgba(0,0,0,0.08); }
.status-label { font-size: 12px; color: #888780; margin-bottom: 1rem; letter-spacing: 0.05em; }
.steps { display: flex; align-items: flex-start; }
.step { display: flex; flex-direction: column; align-items: center; flex: 1; }
.step-icon { width: 58px; height: 58px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.12); background: #f7f5f2; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 1; transition: border-color 0.3s, opacity 0.3s; }
.step-icon img { width: 44px; height: 44px; object-fit: contain; display: block; mix-blend-mode: multiply; }
.step-icon.done { border-color: #cb691a; }
.step-icon.active { border-color: #cb691a; box-shadow: 0 0 0 4px #f5e0cf; }
.step-icon.pending { opacity: 0.28; }
.step-name { font-size: 10px; color: #888780; margin-top: 6px; text-align: center; letter-spacing: 0.03em; }
.step-name.active { color: #cb691a; font-weight: 500; }
.step-name.done { color: #5f5e5a; }
.step-line-wrap { flex: 1; display: flex; align-items: center; margin-top: 29px; }
.step-line { width: 100%; height: 2px; background: rgba(0,0,0,0.1); transition: background 0.3s; }
.step-line.done { background: #cb691a; }
.gift-bar { padding: 1rem 1.25rem; border-top: 0.5px solid rgba(0,0,0,0.08); background: #fdf6f0; }
.gift-label { font-size: 12px; color: #cb691a; font-weight: 500; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.gift-items { font-size: 13px; color: #5f5e5a; line-height: 1.8; }
.error-msg { text-align: center; font-size: 13px; color: #E24B4A; padding: 0.75rem 0 0; display: none; }
.hint { text-align: center; font-size: 12px; color: #888780; margin-top: 1.5rem; letter-spacing: 0.03em; }
</style>
</head>

var API_URL = 'https://script.google.com/macros/s/AKfycbwyvp07FjNYcXAT9pFDrzthR7rf4GnRbfv4Z-0Og4RzxDqHwSw7rub4jcTC-kabX7op/exec';


function handleData(data) {
  var btn = document.getElementById('btn');
  var errEl = document.getElementById('err-msg');
  var card = document.getElementById('result-card');
  btn.textContent = '查詢';
  btn.disabled = false;

  if (!data.success) { errEl.style.display = 'block'; return; }

  document.getElementById('r-order').textContent = data.orderId;
  document.getElementById('r-date').textContent = data.date || '';
  document.getElementById('r-amount').textContent = data.total;

  var itemsEl = document.getElementById('r-items');
  itemsEl.innerHTML = data.items.map(function(it) {
    var sticker = it.sticker ? ' · ' + it.sticker : '';
    var qty = it.qty && it.qty > 1 && it.qty <= 100 ? ' x' + it.qty : '';
    var subline = (it.name || qty) ? '<div class="item-subline">' + (it.name ? '(' + it.name + ')' : '') + qty + '</div>' : '';
    return '<div class="item-line">' + it.style + sticker + subline + '</div>';
  }).join('');

  renderSteps(data.status);

  var totalNum = parseInt((data.total || '').replace(/[^0-9]/g, ''), 10);
  document.getElementById('gift-bar').style.display = (!isNaN(totalNum) && totalNum >= 1000) ? 'block' : 'none';
  card.style.display = 'block';
}

function doSearch() {
  var val = document.getElementById('inp-order').value.trim();
  var errEl = document.getElementById('err-msg');
  var card = document.getElementById('result-card');
  var btn = document.getElementById('btn');
  errEl.style.display = 'none';
  card.style.display = 'none';
  if (!val) return;

  btn.textContent = '查詢中…';
  btn.disabled = true;

  var old = document.getElementById('jsonp-script');
  if (old) old.parentNode.removeChild(old);

  window._cb = function(data) { handleData(data); };

  var s = document.createElement('script');
  s.id = 'jsonp-script';
  s.src = API_URL + '?orderId=' + encodeURIComponent(val) + '&callback=_cb';
  s.onerror = function() { btn.textContent = '查詢'; btn.disabled = false; errEl.style.display = 'block'; };
  document.head.appendChild(s);
}

function renderSteps(current) {
  var idx = STATUSES.indexOf(current);
  var row = document.getElementById('steps-row');
  row.innerHTML = '';
  for (var i = 0; i < STATUSES.length; i++) {
    var step = document.createElement('div');
    step.className = 'step';
    var iconWrap = document.createElement('div');
    iconWrap.className = 'step-icon ' + (i < idx ? 'done' : i === idx ? 'active' : 'pending');
    var img = document.createElement('img');
    img.src = STEP_IMGS[i];
    img.alt = STATUSES[i];
    iconWrap.appendChild(img);
    var name = document.createElement('div');
    name.className = 'step-name' + (i < idx ? ' done' : i === idx ? ' active' : '');
    name.textContent = STATUSES[i];
    step.appendChild(iconWrap);
    step.appendChild(name);
    row.appendChild(step);
    if (i < STATUSES.length - 1) {
      var lw = document.createElement('div');
      lw.className = 'step-line-wrap';
      var l = document.createElement('div');
      l.className = 'step-line' + (i < idx ? ' done' : '');
      lw.appendChild(l);
      row.appendChild(lw);
    }
  }
}

document.getElementById('inp-order').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});
</script>
